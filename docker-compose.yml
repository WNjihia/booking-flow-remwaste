services:
  backend:
    build: ./backend
    container_name: booking-backend
    ports:
      - "8000:8000"
    networks:
      - app

  frontend:
    build: ./frontend
    container_name: booking-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - app

networks:
  app:
