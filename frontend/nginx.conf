server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        proxy_pass https://booking-flow-remwaste-production.up.railway.app/api/;
        proxy_set_header Host booking-flow-remwaste-production.up.railway.app;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}